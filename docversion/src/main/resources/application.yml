spring:
  application:
    name: docversion-core

  # 07/19 - P1-⑤: 기본 활성 프로필 = demo.
  #   demo에서만 DefaultAccountsInitializer가 데모 계정(alice/bob/admin)을 시드한다.
  #   운영 배포 시 SPRING_PROFILES_ACTIVE=prod 로 기동하면 데모 계정이 생성되지 않는다.
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:demo}

  # 알림 이메일 발송 (RD-SRS-9.9). 개발/시연은 MailHog(가짜 SMTP) — compose가 host를 mailhog로 덮어씀.
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}

  datasource:
    # 로컬 개발 시: docker로 MariaDB 10.11 띄운 뒤 접속
    # (Docker 환경: MariaDB + Redis + Nextcloud + Adminer 구성 기준)
    url: jdbc:mariadb://localhost:3306/nextcloud?useUnicode=true&characterEncoding=utf8mb4
    username: ${DB_USER:nextcloud}
    password: ${DB_PASSWORD:nextcloud}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      pool-name: docversion-pool

  flyway:
    enabled: true
    locations: classpath:db/migration
    # Nextcloud DB에 합류하는 형태이므로, 기존 테이블이 있어도 baseline 허용
    baseline-on-migrate: true

# MyBatis: 코어 SQL 직역 계층
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.docversion.domain
  configuration:
    map-underscore-to-camel-case: true   # snake_case 컬럼 → camelCase 필드 자동 매핑
    default-statement-timeout: 30

logging:
  level:
    com.docversion.mapper: debug   # 개발 중 실행 SQL 확인 (parity 대조용)

# 상태 전이 거부 등의 메시지를 응답 본문에 포함 (화면에서 사유 표시용)
server:
  error:
    include-message: always

docversion:
  notify:
    # false면 EMAIL 아웃박스 적재 자체를 생략(메일 서버 없는 환경) — 인앱(WEB)만 동작
    email-enabled: ${DOCVERSION_EMAIL_ENABLED:true}
